];
const select = document.getElementById('teamFilter');
const list = document.getElementById('list');
const search = document.getElementById('search');
const count = document.getElementById('count');

function sortName(country){
  return country.replace(/^\S+\s+/, '').toLowerCase();
}

function isSpecial(country){
  return country.includes('Football World Cup') || country.includes('Coca-Cola');
}

const sortedTeams = [...teams].sort((a,b)=>{
  const specialOrder = ['Football World Cup', 'Coca-Cola'];
  const aSpecial = isSpecial(a.country);
  const bSpecial = isSpecial(b.country);

  if (aSpecial || bSpecial) {
    if (aSpecial && bSpecial) {
      return specialOrder.findIndex(x => a.country.includes(x)) - specialOrder.findIndex(x => b.country.includes(x));
    }
    return aSpecial ? -1 : 1;
  }

  return sortName(a.country).localeCompare(sortName(b.country));
});

const total = sortedTeams.reduce((sum,t)=>sum+t.items.length,0);

sortedTeams.forEach((t,i)=>{
  const opt=document.createElement('option');
  opt.value=i;
  opt.textContent=`${t.country} (${t.items.length})`;
  select.appendChild(opt);
});

function render(){
  const selected=select.value, q=search.value.trim().toLowerCase();
  list.innerHTML=''; let visibleTeams=0, visibleItems=0;

  sortedTeams.forEach((team,i)=>{
    if(selected!=='all' && selected!==String(i)) return;

    const items=team.items.filter(([no,name]) =>
      !q ||
      no.toLowerCase().includes(q) ||
      name.toLowerCase().includes(q) ||
      team.country.toLowerCase().includes(q)
    );

    if(!items.length) return;

    visibleTeams++;
    visibleItems += items.length;

    const section=document.createElement('section');
    section.className='team';
    section.innerHTML=`<h2>${team.country} <span class="team-count">${items.length} missing</span></h2><table><thead><tr><th>No.</th><th>Name</th></tr></thead><tbody>${items.map(([no,name])=>`<tr><td class="no">${no}</td><td>${name}</td></tr>`).join('')}</tbody></table>`;
    list.appendChild(section);
  });

  count.textContent = `${visibleItems} shown / ${total} total`;
}

select.addEventListener('change', render);
search.addEventListener('input', render);
// document.getElementById('printBtn').addEventListener('click',()=>window.print());
render();
</script>
